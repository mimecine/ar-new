backend:
  name: git-gateway
  branch: master
media_folder: "src/media"

# Please run "npx netlify-cms-proxy-server" for local backend
local_backend: true
# publish_mode: editorial_workflow
collections:

  - label: "Artists"
    label_singular: "Artist"
    name: "artists"
    folder: "src/content/artists"
    create: true
    editor:
      preview: false
    fields:
      - { label: "Name", name: "title", widget: "string" }
      - { label: "Biography", name: "body", widget: "markdown" }
      - { label: "Summary", name: "summary", widget: "markdown", required: false }
      - { label: "Featured Image", name: "featuredImage", widget: "image", required: false }
      - label: "Works"
        label_singular: "Work"
        name: "works"
        widget: "list"
        required: false
        summary: "{{fields.image}}"
        fields: 
          - { label: Image, name: src, widget: image }
          - { label: Title, name: title, widget: string, required: false }
          - { label: Group, name: group, widget: string, required: false }
          - { label: "Catalog Number", name: inventorynumber, widget: string, required: false }
          - { label: "Description", name: "info", widget: "text", required: false }
          - { label: "Copyright", name: "credit", widget: "text", required: false }
      - label: "Resources"
        label_singular: "Resource"
        name: "resources"
        widget: "file"
        required: false
        multiple: true
          
  - label: "Rooms"
    label_singular: "Room"
    name: "rooms"
    folder: "src/content/rooms"
    create: true
    editor:
      preview: false
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Start", name: "start", widget: "datetime", date_format: 'dd.MM.yyyy', time_format: false, format: 'yyyy-MM-dd'}
      - { label: "End", name: "end", widget: "datetime", date_format: 'dd.MM.yyyy', time_format: false, format: 'yyyy-MM-dd', required: false}
      - { label: "Priority", name: "priority", widget: "number", required: false }
      - { label: "Hidden", name: "hidden", widget: "boolean", required: false }
      - label: "Artists"
        name: "artists"
        widget: "relation"
        collection: "artists"
        multiple: true
        search_fields: ["title"]
        value_field: "{{slug}}"
        display_fields: ["title"]
      - label: "Venue"
        name: "venue"
        widget: "relation"
        collection: "venues"
        search_fields: ["title", "town"]
        value_field: "{{slug}}"
        display_fields: ["title", "town"]
      - { label: "About", name: "body", widget: "markdown", required: false }
      - label: "Images"
        label_singular: "Image"
        name: "images"
        widget: "image"
        required: false
        multiple: true

  - label: "Venues"
    label_singular: "Venue"
    name: "venues"
    folder: "src/content/venues"
    create: true
    editor:
      preview: false
    fields:
      - { label: "Venue", name: "title", widget: "string" }
      - { label: "Town", name: "town", widget: "string" }
      - { label: "Address", name: "address", widget: "string", required: false }
      - { label: "Map", name: "map", widget: "string", required: false }
      - { label: "About", name: "body", widget: "markdown", required: false }
  
  - label: "Films"
    label_singular: "Film"
    name: "films"
    editor:
      preview: false
    folder: "src/content/films"
    create: true
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Url", name: "url", widget: "string" }
      - label: "Artists"
        name: "artists"
        widget: "relation"
        collection: "artists"
        multiple: true
        search_fields: ["title"]
        value_field: "{{slug}}"
        display_fields: ["title"]
        required: false        

  - label: "Site Settings"
    name: "settings"
    editor:
      preview: false
    files:
    - label: "Homepage Settings"
      name: "index_settings"
      file: "src/_data/index_settings.json"
      fields:
        - label: "Images"
          label_singular: "Image"
          name: "works"
          widget: "list"
          required: false
          summary: "{{fields.image}}"
          fields: 
            - { label: Image, name: src, widget: image }
            - { label: "Description", name: "info", widget: "text", required: false }
            - { label: "Copyright", name: "credit", widget: "text", required: false }
        - label: "Featured Rooms"
          name: "rooms"
          widget: "relation"
          collection: "rooms"
          multiple: true
          search_fields: ["title","town"]
          value_field: "{{slug}}"
          display_fields: ["title","town"]
          required: false
        - label: "Featured Artists"
          name: "artists"
          widget: "relation"
          collection: "artists"
          multiple: true
          search_fields: ["title"]
          value_field: "{{slug}}"
          display_fields: ["title"]
          required: false
        - label: "Featured Films"
          name: "films"
          widget: "relation"
          collection: "films"
          multiple: true
          search_fields: ["title"]
          value_field: "{{slug}}"
          display_fields: ["title"]
          required: false
        - label: "Sections"
          label_singular: "Section"
          name: "sections"
          widget: "list"
          summary: "{{fields.title}}"
          required: false
          fields: 
            - { label: Title, name: title, widget: string, required: false }
            - { label: Text, name: text, widget: markdown, required: false }

    - label: "Rooms Page Settings"
      name: "rooms_settings"
      file: "src/_data/rooms_settings.json"
      fields:
        - label: "Featured Rooms"
          name: "rooms"
          widget: "relation"
          collection: "rooms"
          multiple: true
          search_fields: ["title","town"]
          value_field: "{{slug}}"
          display_fields: ["title","town"]        
          required: false        
    - label: "Artists Page Settings"
      name: "artists_settings"
      file: "src/_data/artists_settings.json"
      fields:
        - label: "Featured Artists"
          name: "artists"
          widget: "relation"
          collection: "artists"
          multiple: true
          search_fields: ["title"]
          value_field: "{{slug}}"
          display_fields: ["title"] 
          required: false        
    - label: "Films Page Settings"
      name: "films_settings"
      file: "src/_data/films_settings.json"
      fields:
        - label: "Featured Films"
          name: "films"
          widget: "relation"
          collection: "films"
          multiple: true
          search_fields: ["title"]
          value_field: "{{slug}}"
          display_fields: ["title"]  
          required: false        
    - label: "Links"
      name: "links"
      file: "src/_data/links.yml"
      fields:
        - label: "Nav Items"
          name: links
          widget: list
          collapsed: false
          fields:
            - { label: Title, name: title, widget: string }
            - { label: URL, name: url, widget: string }
            - { label: Description, name: desc, widget: string, required: false }
    - label: "Meta Settings"
      name: "settings"
      file: "src/_data/settings.yml"
      fields:
        - { label: Name, name: name, widget: string }
        - { label: Author, name: author, widget: string }
        - { label: URL, name: url, widget: string }
