  #           - { label: Images, name: images, widget: hidden, required: false, multiple: true }
            
          

  - label: "Site Settings"
    name: "settings"
    editor:
      preview: false
    files:
    - label: "Homepage Settings"
      name: "index_settings"
      file: "src/_data/index_settings.json"
      fields:
        - label: "Images"
          label_singular: "Image"
          name: "works"
          widget: "list"
          required: false
          summary: "{{fields.image}}"
          fields: 
            - { label: Image, name: src, widget: image }
            - { label: "Description", name: "info", widget: "text", required: false }
            - { label: "Copyright", name: "credit", widget: "text", required: false }
        - label: "Featured Rooms"
          name: "rooms"
          widget: "relation"
          collection: "rooms"
          multiple: true
          search_fields: ["title","town"]
          value_field: "{{slug}}"
          display_fields: ["title","town"]
          required: false
        - label: "Featured Artists"
          name: "artists"
          widget: "relation"
          collection: "artists"
          multiple: true
          search_fields: ["title"]
          value_field: "{{slug}}"
          display_fields: ["title"]
          required: false
        - label: "Featured Films"
          name: "films"
          widget: "relation"
          collection: "films"
          multiple: true
          search_fields: ["title"]
          value_field: "{{slug}}"
          display_fields: ["title"]
          required: false
        - label: "Sections"
          label_singular: "Section"
          name: "sections"
          widget: "list"
          summary: "{{fields.title}}"
          required: false
          fields: 
            - { label: Title, name: title, widget: string, required: false }
            - { label: Text, name: text, widget: markdown, required: false }

    - label: "Rooms Page Settings"
      name: "rooms_settings"
      file: "src/_data/rooms_settings.json"
      fields:
        - label: "Featured Rooms"
          name: "rooms"
          widget: "relation"
          collection: "rooms"
          multiple: true
          search_fields: ["title","town"]
          value_field: "{{slug}}"
          display_fields: ["title","town"]        
          required: false        
    - label: "Artists Page Settings"
      name: "artists_settings"
      file: "src/_data/artists_settings.json"
      fields:
        - label: "Featured Artists"
          name: "artists"
          widget: "relation"
          collection: "artists"
          multiple: true
          search_fields: ["title"]
          value_field: "{{slug}}"
          display_fields: ["title"] 
          required: false        
    - label: "Films Page Settings"
      name: "films_settings"
      file: "src/_data/films_settings.json"
      fields:
        - label: "Featured Films"
          name: "films"
          widget: "relation"
          collection: "films"
          multiple: true
          search_fields: ["title"]
          value_field: "{{slug}}"
          display_fields: ["title"]  
          required: false        
    - label: "Links"
      name: "links"
      file: "src/_data/links.yml"
      fields:
        - label: "Nav Items"
          name: links
          widget: list
          collapsed: false
          fields:
            - { label: Title, name: title, widget: string }
            - { label: URL, name: url, widget: string }
            - { label: Description, name: desc, widget: string, required: false }
    - label: "Meta Settings"
      name: "settings"
      file: "src/_data/settings.yml"
      fields:
        - { label: Name, name: name, widget: string }
        - { label: Author, name: author, widget: string }
        - { label: URL, name: url, widget: string }
