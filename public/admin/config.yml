backend:
  name: git-gateway
  branch: master
media_folder: "src/media"

# Please run "npx netlify-cms-proxy-server" for local backend
local_backend: true
# publish_mode: editorial_workflow
collections:

  - label: "Artists"
    label_singular: "Artist"
    name: "artists"
    folder: "src/content/artists"
    create: true
    editor:
      preview: false
    fields:
      - { label: "Name", name: "title", widget: "string" }
      - { label: "Biography", name: "body", widget: "markdown" }
      - { label: "Summary", name: "summary", widget: "markdown", required: false }
      - { label: "Featured Image", name: "featuredImage", widget: "image", required: false }
      - label: "Works"
        label_singular: "Work"
        name: "works"
        widget: "list"
        required: false
        summary: "{{fields.image}}"
        fields: 
          - { label: Image, name: src, widget: image }
          - { label: Title, name: title, widget: string, required: false }
          - { label: Group, name: group, widget: string, required: false }
          - { label: "Catalog Number", name: inventorynumber, widget: string, required: false }
          - { label: "Description", name: "info", widget: "text", required: false }
          - { label: "Copyright", name: "credit", widget: "text", required: false }
      - label: "Resources"
        label_singular: "Resource"
        name: "resources"
        widget: "file"
        required: false
        multiple: true
          
  - label: "Rooms"
    label_singular: "Room"
    name: "rooms"
    folder: "src/content/rooms"
    create: true
    # summary: "{{fields.title}}, Open {{fields.start}} to {{fields.end | date('yyyy')}}" - not working
    summary: "{{title}} - {{venue}}"
    summary_fields: ["title","venue"]
    sortable_fields: 
      fields: ["title","venue"]
      default:
        field: "title"
        direction: Descending
    editor:
      preview: false
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Start", name: "start", widget: "datetime", date_format: 'dd.MM.yyyy', time_format: false, format: 'yyyy-MM-dd'}
      - { label: "End", name: "end", widget: "datetime", date_format: 'dd.MM.yyyy', time_format: false, format: 'yyyy-MM-dd', required: false}
      - { label: "Priority", name: "priority", widget: "number", required: false, default: 0 }
      - { label: "Hidden", name: "hidden", widget: "boolean", required: false }
      - label: "Artists"
        name: "artists"
        widget: "relation"
        collection: "artists"
        multiple: true
        search_fields: ["title"]
        value_field: "{{slug}}"
        display_fields: ["title"]
      - label: "Venue"
        name: "venue"
        widget: "relation"
        collection: "venues"
        search_fields: ["title", "town"]
        value_field: "{{slug}}"
        display_fields: ["title", "town"]
      - { label: "About", name: "body", widget: "markdown", required: false }
      - label: "Images"
        label_singular: "Image"
        name: "images"
        widget: "image"
        required: false
        multiple: true

  - label: "Venues"
    label_singular: "Venue"
    name: "venues"
    folder: "src/content/venues"
    create: true
    summary_fields: ["title","town"]
    editor:
      preview: false
    fields:
      - { label: "Venue", name: "title", widget: "string" }
      - { label: "Town", name: "town", widget: "string" }
      - { label: "Address", name: "address", widget: "string", required: false }
      - { label: "Map", name: "map", widget: "string", required: false }
      - { label: "About", name: "body", widget: "markdown", required: false }
  
  - label: "Films"
    label_singular: "Film"
    name: "films"
    editor:
      preview: false
    folder: "src/content/films"
    create: true
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Url", name: "url", widget: "string" }
      - label: "Artists"
        name: "artists"
        widget: "relation"
        collection: "artists"
        multiple: true
        search_fields: ["title"]
        value_field: "{{slug}}"
        display_fields: ["title"]
        required: false        

  # - label: "JSON"
  #   name: "rooms_json"
  #   editor:
  #     preview: false
  #   files:
  #     - label: "Rooms Data"
  #       name: "rooms"
  #       file: "scripts/rooms.json"
  #       fields:
  #       - label: "Rooms"
  #         name: "rooms"
  #         widget: "list"
